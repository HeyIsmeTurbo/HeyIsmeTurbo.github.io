<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Wars Characters</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="sticker-sky" aria-hidden="true">
    <img class="sticker sticker-img" src="img/stickers/sticker-1.png" alt="">
    <img class="sticker sticker-img" src="img/stickers/sticker-2.png" alt="">
    <img class="sticker sticker-img" src="img/stickers/sticker-3.png" alt="">
    <img class="sticker sticker-img" src="img/stickers/sticker-1.png" alt="">
    <img class="sticker sticker-img" src="img/stickers/sticker-2.png" alt="">
    <img class="sticker sticker-img" src="img/stickers/sticker-3.png" alt="">
    <img class="sticker sticker-img" src="img/stickers/sticker-1.png" alt="">
    <img class="sticker sticker-img" src="img/stickers/sticker-2.png" alt="">
    <img class="sticker sticker-img" src="img/stickers/sticker-3.png" alt="">
    <img class="sticker sticker-img" src="img/stickers/sticker-1.png" alt="">
    <img class="sticker sticker-img" src="img/stickers/sticker-2.png" alt="">
    <img class="sticker sticker-img" src="img/stickers/sticker-3.png" alt="">
  </div>

  <header>
    <div class="header-top">
      <div>
        <h1>Star Wars Universe</h1>
        <p>Explore the galaxy</p>
      </div>
      <button id="open-settings" class="settings-btn" type="button" aria-label="Open preferences">
        ⚙ Preferences
      </button>
    </div>
  </header>

  <div class="container">
    <aside class="sidebar">
      <h2>Categories</h2>
      <nav class="categories-nav">
        <button class="category-btn active" data-category="people" data-label="Characters">
          👤 Characters
        </button>
        <button class="category-btn" data-category="starships" data-label="Spaceships">
          🚀 Spaceships
        </button>
        <button class="category-btn" data-category="vehicles" data-label="Vehicles">
          🏎️ Vehicles
        </button>
        <button class="category-btn" data-category="species" data-label="Species">
          👽 Species
        </button>
        <button class="category-btn" data-category="planets" data-label="Planets">
          🪐 Planets
        </button>
      </nav>
    </aside>

    <main>
      <div id="category-title" class="category-title">Characters</div>
      <div id="loading" class="loading">Loading...</div>
      <div id="error" class="error"></div>
      <div id="cards-container" class="cards-container"></div>
    </main>
  </div>

  <footer>
    <p>&copy; 2026 Star Wars Cards App | Data from SWAPI</p>
  </footer>

  <div id="settings-overlay" class="settings-overlay" aria-hidden="true">
    <div class="settings-panel" role="dialog" aria-modal="true" aria-label="User preferences">
      <div class="settings-head">
        <h2>Preferences</h2>
        <button id="close-settings" class="settings-close" type="button" aria-label="Close preferences">&times;</button>
      </div>

      <div class="settings-body">
        <label class="settings-row" for="pref-default-category">
          <span>Default category</span>
          <select id="pref-default-category"></select>
        </label>

        <label class="settings-row" for="pref-card-density">
          <span>Card size</span>
          <select id="pref-card-density">
            <option value="large">Large</option>
            <option value="normal">Normal</option>
            <option value="compact">Compact</option>
          </select>
        </label>

        <label class="settings-row settings-toggle" for="pref-stickers-enabled">
          <span>Flying stickers</span>
          <input id="pref-stickers-enabled" type="checkbox">
        </label>

        <label class="settings-row settings-toggle" for="pref-reduced-motion">
          <span>Reduced motion</span>
          <input id="pref-reduced-motion" type="checkbox">
        </label>
      </div>

      <div class="settings-actions">
        <button id="reset-preferences" type="button" class="settings-secondary">Reset</button>
        <button id="save-preferences" type="button" class="settings-primary">Save preferences</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
