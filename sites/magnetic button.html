<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Button Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .button-container {
            position: relative;
            width: 150px;
            height: 150px;
        }

        .magnetic-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 16px 32px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid white;
            border-radius: 50px;
            cursor: pointer;
            transition: box-shadow 0.3s ease;
            z-index: 10;
            user-select: none;
        }

        .magnetic-btn:hover {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .magnetic-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .info {
            position: absolute;
            top: 30px;
            left: 30px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="info">Move your cursor near the button 🧲</div>
    
    <div class="button-container">
        <button class="magnetic-btn">Click Me!</button>
    </div>

    <script>
        const button = document.querySelector('.magnetic-btn');
        const container = document.querySelector('.button-container');
        let mouseX = 0;
        let mouseY = 0;

        const magnetDistance = 100; // Distance at which button starts to pull
        const pullStrength = 0.3; // How much it pulls (0-1)

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // Get button's center position
            const buttonRect = button.getBoundingClientRect();
            const buttonX = buttonRect.left + buttonRect.width / 2;
            const buttonY = buttonRect.top + buttonRect.height / 2;

            // Calculate distance between cursor and button
            const distX = mouseX - buttonX;
            const distY = mouseY - buttonY;
            const distance = Math.hypot(distX, distY);

            // If cursor is within magnet distance, pull the button
            if (distance < magnetDistance) {
                // Calculate pull offset (inverse direction - button moves towards cursor)
                const pullX = -distX * pullStrength;
                const pullY = -distY * pullStrength;

                button.style.transform = `translate(calc(-50% + ${pullX}px), calc(-50% + ${pullY}px))`;
            } else {
                // Return to center smoothly
                button.style.transform = 'translate(-50%, -50%)';
            }
        });

        // Reset position when mouse leaves
        document.addEventListener('mouseleave', () => {
            button.style.transform = 'translate(-50%, -50%)';
        });

        // Add smooth transition for non-active states
        button.addEventListener('mouseenter', () => {
            button.style.transition = 'all 0.1s ease-out';
        });

        button.addEventListener('mouseleave', () => {
            button.style.transition = 'box-shadow 0.3s ease';
        });
    </script>
</body>
</html>
