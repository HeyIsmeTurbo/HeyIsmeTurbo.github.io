<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Filter Effect</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .image-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 800px;
            width: 100%;
        }

        img {
            width: 100%;
            height: auto;
            transition: filter 0.3s ease;
            filter: grayscale(100%);
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        img:hover {
            filter: brightness(1.5) saturate(2) hue-rotate(180deg);
        }
    </style>
</head>
<body>
    <h1>Hover over the images to see the filter change!</h1>
    <div class="image-container">
        <img src="ghost-green.png" alt="Green Ghost">
        <img src="ghost-purple.png" alt="Purple Ghost">
        <img src="ghost-yellow.png" alt="Yellow Ghost">
        <img src="ghost-red.png" alt="Red Ghost">
    </div>
</body>
</html>
