<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Explode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            overflow: hidden;
            cursor: crosshair;
            font-family: Arial, sans-serif;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: explode 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes explode {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0.3) rotate(360deg);
            }
        }

        .circle {
            border-radius: 50%;
        }

        .star {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        .square {
            transform: rotate(45deg);
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="info">Click anywhere to explode! 💥</div>

    <script>
        const icons = ['circle', 'star', 'square'];
        const colors = [
            '#FF6B6B',
            '#4ECDC4',
            '#45B7D1',
            '#FFA07A',
            '#98D8C8',
            '#F7DC6F',
            '#BB8FCE',
            '#85C1E9',
            '#F8B739',
            '#52E5B2'
        ];

        document.addEventListener('click', (e) => {
            const clickX = e.clientX;
            const clickY = e.clientY;
            
            // Create 12 particles flying outward
            const particleCount = 12;
            for (let i = 0; i < particleCount; i++) {
                createParticle(clickX, clickY, i, particleCount);
            }
        });

        function createParticle(x, y, index, total) {
            const particle = document.createElement('div');
            const icon = icons[Math.floor(Math.random() * icons.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            const size = Math.random() * 20 + 15; // 15-35px
            
            particle.className = `particle ${icon}`;
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.color = color;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            
            // Calculate direction (360 degrees divided evenly)
            const angle = (index / total) * Math.PI * 2;
            const distance = 150 + Math.random() * 100;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;
            
            particle.style.setProperty('--tx', tx + 'px');
            particle.style.setProperty('--ty', ty + 'px');

            if (icon === 'circle' || icon === 'square') {
                particle.style.backgroundColor = color;
            } else {
                particle.style.backgroundColor = color;
            }

            document.body.appendChild(particle);

            // Remove particle from DOM after animation completes
            setTimeout(() => {
                particle.remove();
            }, 800);
        }
    </script>
</body>
</html>
