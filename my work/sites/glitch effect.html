<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Effect on Hover</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        h1 {
            color: #00ff00;
            font-size: 32px;
            text-shadow: 0 0 10px #00ff00;
        }

        .info {
            color: #00ff88;
            font-size: 16px;
            text-align: center;
        }

        .glitch-container {
            position: relative;
            width: 300px;
            height: 300px;
            cursor: pointer;
        }

        .glitch-image {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #00ff00;
            border-radius: 12px;
            overflow: hidden;
            font-size: 100px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        /* Glitch effect layers */
        .glitch-image::before,
        .glitch-image::after {
            content: '🎨';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            font-weight: bold;
            overflow: hidden;
        }

        .glitch-image::before {
            animation: none;
            color: #ff00ff;
            z-index: 2;
        }

        .glitch-image::after {
            animation: none;
            color: #00ffff;
            z-index: 3;
        }

        .glitch-container:hover .glitch-image::before {
            animation: glitch-anim-1 0.3s infinite;
            clip-path: polygon(0% 0%, 100% 0%, 100% 35%, 0% 35%);
        }

        .glitch-container:hover .glitch-image::after {
            animation: glitch-anim-2 0.3s infinite;
            clip-path: polygon(0% 65%, 100% 65%, 100% 100%, 0% 100%);
        }

        .glitch-container:hover .glitch-image {
            animation: glitch-flicker 0.15s infinite;
        }

        @keyframes glitch-anim-1 {
            0% {
                clip-path: polygon(0% 0%, 100% 0%, 100% 35%, 0% 35%);
                transform: translate(-2px, -2px);
            }
            20% {
                clip-path: polygon(0% 0%, 100% 0%, 100% 10%, 0% 10%);
                transform: translate(2px, 2px);
            }
            40% {
                clip-path: polygon(0% 20%, 100% 20%, 100% 35%, 0% 35%);
                transform: translate(-2px, 2px);
            }
            60% {
                clip-path: polygon(0% 30%, 100% 30%, 100% 50%, 0% 50%);
                transform: translate(2px, -2px);
            }
            80% {
                clip-path: polygon(0% 0%, 100% 0%, 100% 15%, 0% 15%);
                transform: translate(-2px, -2px);
            }
            100% {
                clip-path: polygon(0% 0%, 100% 0%, 100% 35%, 0% 35%);
                transform: translate(0, 0);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                clip-path: polygon(0% 65%, 100% 65%, 100% 100%, 0% 100%);
                transform: translate(2px, 2px);
            }
            20% {
                clip-path: polygon(0% 75%, 100% 75%, 100% 100%, 0% 100%);
                transform: translate(-2px, -2px);
            }
            40% {
                clip-path: polygon(0% 60%, 100% 60%, 100% 80%, 0% 80%);
                transform: translate(2px, -2px);
            }
            60% {
                clip-path: polygon(0% 70%, 100% 70%, 100% 100%, 0% 100%);
                transform: translate(-2px, 2px);
            }
            80% {
                clip-path: polygon(0% 65%, 100% 65%, 100% 90%, 0% 90%);
                transform: translate(2px, 2px);
            }
            100% {
                clip-path: polygon(0% 65%, 100% 65%, 100% 100%, 0% 100%);
                transform: translate(0, 0);
            }
        }

        @keyframes glitch-flicker {
            0% {
                text-shadow: 0 0 10px #00ff00;
                color: #00ff00;
            }
            20% {
                text-shadow: 0 0 20px #ff00ff, 0 0 10px #00ffff;
                color: #ff00ff;
            }
            40% {
                text-shadow: 0 0 10px #00ff00;
                color: #00ffff;
            }
            60% {
                text-shadow: 0 0 20px #00ffff, 0 0 10px #ff00ff;
                color: #ff00ff;
            }
            80% {
                text-shadow: 0 0 10px #00ff00;
                color: #00ff00;
            }
            100% {
                text-shadow: 0 0 10px #00ff00;
                color: #00ff00;
            }
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 40px;
            max-width: 600px;
        }

        .glitch-item {
            position: relative;
            width: 150px;
            height: 150px;
            cursor: pointer;
        }

        .glitch-item-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #00ff00;
            border-radius: 8px;
            overflow: hidden;
            font-size: 50px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .glitch-item-content::before,
        .glitch-item-content::after {
            content: attr(data-icon);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-weight: bold;
            overflow: hidden;
        }

        .glitch-item-content::before {
            color: #ff00ff;
            z-index: 2;
        }

        .glitch-item-content::after {
            color: #00ffff;
            z-index: 3;
        }

        .glitch-item:hover .glitch-item-content::before {
            animation: glitch-small-1 0.2s infinite;
            clip-path: polygon(0% 0%, 100% 0%, 100% 40%, 0% 40%);
        }

        .glitch-item:hover .glitch-item-content::after {
            animation: glitch-small-2 0.2s infinite;
            clip-path: polygon(0% 60%, 100% 60%, 100% 100%, 0% 100%);
        }

        .glitch-item:hover .glitch-item-content {
            animation: glitch-flicker-small 0.15s infinite;
        }

        @keyframes glitch-small-1 {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(-1px, -1px);
            }
        }

        @keyframes glitch-small-2 {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(1px, 1px);
            }
        }

        @keyframes glitch-flicker-small {
            0%, 100% {
                text-shadow: 0 0 5px #00ff00;
                color: #00ff00;
            }
            50% {
                text-shadow: 0 0 10px #ff00ff, 0 0 5px #00ffff;
                color: #ff00ff;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Glitch Effect on Hover</h1>
        <div class="info">Hover over the images to see the glitch effect</div>

        <div class="glitch-container">
            <div class="glitch-image"></div>
        </div>

        <div class="gallery">
            <div class="glitch-item">
                <div class="glitch-item-content" data-icon="🎨"></div>
            </div>
            <div class="glitch-item">
                <div class="glitch-item-content" data-icon="🎭"></div>
            </div>
            <div class="glitch-item">
                <div class="glitch-item-content" data-icon="🎪"></div>
            </div>
            <div class="glitch-item">
                <div class="glitch-item-content" data-icon="🎯"></div>
            </div>
        </div>
    </div>

    <script>
        // Optional: Add randomness to glitch effect
        const glitchContainers = document.querySelectorAll('.glitch-container, .glitch-item');
        
        glitchContainers.forEach(container => {
            container.addEventListener('mouseenter', () => {
                // Add slight random variations to animation
                const elements = container.querySelectorAll('[class*="glitch"]');
                elements.forEach(el => {
                    el.style.animationDuration = (Math.random() * 0.2 + 0.1) + 's';
                });
            });

            container.addEventListener('mouseleave', () => {
                // Reset animation duration
                const elements = container.querySelectorAll('[class*="glitch"]');
                elements.forEach(el => {
                    el.style.animationDuration = '';
                });
            });
        });
    </script>
</body>
</html>
