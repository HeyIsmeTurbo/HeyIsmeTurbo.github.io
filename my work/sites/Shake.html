<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shake to Drop</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            overflow: hidden;
        }

        .content {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
        }

        .box {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .shaking .box {
            animation: drop 0.6s forwards;
        }

        @keyframes drop {
            0% {
                transform: translateY(0) rotate(0);
                opacity: 1;
            }
            50% {
                transform: translateY(40px) rotate(10deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(200px) rotate(30deg);
                opacity: 0;
            }
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="info">Quickly shake mouse left/right to make elements drop</div>
    <div class="content">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
    </div>

    <script>
        let lastX = null;
        let lastTime = null;
        let shakeThreshold = 1200; // px per second threshold
        let lastVelocity = 0;
        let shaking = false;
        const body = document.body;

        document.addEventListener('mousemove', (e) => {
            const now = performance.now();
            if (lastX !== null && lastTime !== null) {
                const dx = e.clientX - lastX;
                const dt = (now - lastTime) / 1000; // seconds
                const velocity = dx / dt; // px/sec

                // detect rapid change in direction with high speed
                if (Math.abs(velocity) > shakeThreshold && Math.sign(velocity) !== Math.sign(lastVelocity)) {
                    triggerShake();
                }

                lastVelocity = velocity;
            }

            lastX = e.clientX;
            lastTime = now;
        });

        function triggerShake() {
            if (shaking) return;
            shaking = true;
            body.classList.add('shaking');

            // after animation, reset
            setTimeout(() => {
                body.classList.remove('shaking');
                // remove boxes so they disappear
                document.querySelectorAll('.box').forEach(el => el.remove());
                shaking = false;
            }, 800);
        }
    </script>
</body>
</html>
