<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click to Place Stickers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            overflow: hidden;
            cursor: crosshair;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            z-index: 1000;
        }

        .header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #666;
        }

        .sticker {
            position: absolute;
            user-select: none;
            pointer-events: none;
            font-size: 60px;
            animation: stickerAppear 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes stickerAppear {
            0% {
                opacity: 0;
                transform: scale(0) rotate(0deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(var(--rotation));
            }
        }

        .clear-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #ff6b6b;
            color: #ff6b6b;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .clear-btn:hover {
            background: #ff6b6b;
            color: white;
            transform: scale(1.05);
        }

        .clear-btn:active {
            transform: scale(0.95);
        }

        .sticker-count {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            color: #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎨 Sticker Canvas</h1>
        <p>Click anywhere to place stickers!</p>
    </div>

    <div class="sticker-count">
        Stickers: <strong id="count">0</strong>
    </div>

    <button class="clear-btn" id="clearBtn">Clear All</button>

    <script>
        const stickers = [
            '😀', '😂', '😍', '🤔', '😎', '🚀', '⭐', '🎉',
            '🎨', '🎭', '🎪', '🎯', '🎲', '🎸', '🎺', '🎻',
            '🌈', '🌟', '✨', '💫', '🔥', '💥', '🌸', '🌺',
            '🍕', '🍔', '🍓', '🍰', '🎂', '🍩', '☕', '🍷',
            '🚗', '✈️', '🚁', '🚂', '⛵', '🚀', '🛸', '🚁',
            '❤️', '💙', '💚', '💛', '💜', '🖤', '🤍', '🤎',
            '👑', '💎', '🏆', '🎖️', '🏅', '⚡', '🌙', '☀️'
        ];

        let stickerCount = 0;
        const countElement = document.getElementById('count');
        const clearBtn = document.getElementById('clearBtn');

        document.addEventListener('click', (e) => {
            // Don't create sticker if clicking on buttons or header
            if (e.target.closest('.clear-btn') || e.target.closest('.header') || e.target.closest('.sticker-count')) {
                return;
            }

            createSticker(e.clientX, e.clientY);
        });

        function createSticker(x, y) {
            const sticker = document.createElement('div');
            sticker.className = 'sticker';

            // Random sticker from array
            const randomSticker = stickers[Math.floor(Math.random() * stickers.length)];
            sticker.textContent = randomSticker;

            // Random rotation angle (0-360 degrees)
            const rotation = Math.floor(Math.random() * 360);
            sticker.style.setProperty('--rotation', rotation + 'deg');

            // Random scale (0.8 to 1.2)
            const scale = 0.8 + Math.random() * 0.4;
            sticker.style.transform = `translate(-50%, -50%) scale(${scale}) rotate(${rotation}deg)`;

            // Position at click location
            sticker.style.left = x + 'px';
            sticker.style.top = y + 'px';

            document.body.appendChild(sticker);
            stickerCount++;
            countElement.textContent = stickerCount;

            // Remove animation class after animation completes
            setTimeout(() => {
                sticker.style.animation = 'none';
            }, 400);
        }

        clearBtn.addEventListener('click', () => {
            const allStickers = document.querySelectorAll('.sticker');
            allStickers.forEach(sticker => {
                sticker.style.animation = 'stickerAppear 0.3s ease-out reverse forwards';
                setTimeout(() => {
                    sticker.remove();
                }, 300);
            });
            stickerCount = 0;
            countElement.textContent = stickerCount;
        });
    </script>
</body>
</html>
