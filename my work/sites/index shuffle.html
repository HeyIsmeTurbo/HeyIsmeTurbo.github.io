<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Shuffle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            position: relative;
            height: 100vh;
        }

        .element {
            position: absolute;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border: 2px solid #333;
            cursor: pointer;
            transition: box-shadow 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .element:hover {
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        #order-display {
            position: fixed;
            top: 10px;
            right: 10px;
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="order-display">Layer Order: </div>

    <div class="element" id="elem1" style="top: 50px; left: 50px; z-index: 1;">Element 1</div>
    <div class="element" id="elem2" style="top: 150px; left: 150px; z-index: 2;">Element 2</div>
    <div class="element" id="elem3" style="top: 250px; left: 250px; z-index: 3;">Element 3</div>
    <div class="element" id="elem4" style="top: 350px; left: 350px; z-index: 4;">Element 4</div>

    <script>
        let maxZ = 10; // starting high z-index

        document.querySelectorAll('.element').forEach(elem => {
            elem.addEventListener('click', () => {
                elem.style.zIndex = maxZ++;
                updateOrderDisplay();
            });
        });

        function updateOrderDisplay() {
            const elements = Array.from(document.querySelectorAll('.element')).sort((a, b) => {
                return parseInt(getComputedStyle(b).zIndex) - parseInt(getComputedStyle(a).zIndex);
            });
            const order = elements.map(el => el.id + '(' + getComputedStyle(el).zIndex + ')').join(' > ');
            document.getElementById('order-display').textContent = 'Layer Order: ' + order;
        }

        updateOrderDisplay(); // initial display
    </script>
</body>
</html>
