<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Trail with Geometric Shapes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            overflow: hidden;
            cursor: crosshair;
            font-family: Arial, sans-serif;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            z-index: 1000;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            padding: 16px 24px;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.9) 0%, rgba(78, 205, 196, 0.9) 100%);
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: fadeOut 0.8s ease-out forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: scale(1) translate(0, 0);
            }
            100% {
                opacity: 0;
                transform: scale(0) translate(var(--tx), var(--ty));
            }
        }

        .circle {
            border-radius: 50%;
        }

        .square {
            transform: rotate(0deg);
        }

        .triangle {
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 16px solid currentColor;
        }

        .diamond {
            transform: rotate(45deg);
        }

        .star {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }
    </style>
</head>
<body>
    <div class="info">Move your mouse to create geometric shapes ✨</div>

    <script>
        const shapes = ['circle', 'square', 'diamond', 'star'];
        const colors = [
            '#FF6B6B',
            '#4ECDC4',
            '#45B7D1',
            '#FFA07A',
            '#98D8C8',
            '#F7DC6F',
            '#BB8FCE',
            '#85C1E9'
        ];

        let mouseX = 0;
        let mouseY = 0;
        let lastX = 0;
        let lastY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // Create a particle every 3 pixels of movement
            const distance = Math.hypot(mouseX - lastX, mouseY - lastY);
            if (distance > 3) {
                createParticle(lastX, lastY);
                lastX = mouseX;
                lastY = mouseY;
            }
        });

        function createParticle(x, y) {
            const particle = document.createElement('div');
            const shapeType = shapes[Math.floor(Math.random() * shapes.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            const size = Math.random() * 12 + 8; // 8-20px
            
            particle.className = `particle ${shapeType}`;
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.color = color;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            
            // Random direction for particle drift
            const tx = (Math.random() - 0.5) * 100;
            const ty = (Math.random() - 0.5) * 100 - 50;
            
            particle.style.setProperty('--tx', tx + 'px');
            particle.style.setProperty('--ty', ty + 'px');

            // Special handling for triangle (it's already a shape with border)
            if (shapeType === 'triangle') {
                particle.style.borderBottomColor = color;
            } else if (shapeType !== 'star') {
                particle.style.backgroundColor = color;
            } else {
                particle.style.backgroundColor = color;
            }

            document.body.appendChild(particle);

            // Remove particle from DOM after animation completes
            setTimeout(() => {
                particle.remove();
            }, 800);
        }

        // Prevent lag from too many particles
        document.addEventListener('mouseleave', () => {
            lastX = 0;
            lastY = 0;
        });
    </script>
</body>
</html>
