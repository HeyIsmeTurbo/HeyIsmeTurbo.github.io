<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaotic Floating Interface</title>
<style>
    * {
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    body{
        width:100%;
        height:100vh;
        background: linear-gradient(135deg,#232526 0%,#414345 100%);
        overflow:hidden;
        font-family:Arial,sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        gap:40px;
    }
    .floating{
        display:inline-block;
        padding:20px 40px;
        background:rgba(255,255,255,0.1);
        border:2px solid rgba(255,255,255,0.2);
        border-radius:12px;
        backdrop-filter:blur(8px);
        color:#fff;
        font-size:20px;
        text-align:center;
        cursor:pointer;
        will-change:transform;
    }
</style>
</head>
<body>
    <div class="floating">Button 1</div>
    <div class="floating">Button 2</div>
    <div class="floating">Button 3</div>
    <div class="floating">Button 4</div>
    <div class="floating">Button 5</div>
    <script>
        const floats = document.querySelectorAll('.floating');
        const speeds=[];
        floats.forEach(el=>{
            speeds.push((Math.random()*0.02+0.005));
        });
        function animate(){
            floats.forEach((el,i)=>{
                const speed=speeds[i];
                const current=el.dataset.angle?parseFloat(el.dataset.angle):0;
                const next=current+speed;
                el.dataset.angle=next;
                el.style.transform=`rotate(${next}rad)`;
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
